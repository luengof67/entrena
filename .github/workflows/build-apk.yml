name: Compilar APK firmado

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Añadir plataforma Android
        run: npx cap add android

      - name: Generar iconos y splash
        run: npx capacitor-assets generate --android

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Restaurar keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/planea-keystore.jks

      - name: Compilar APK release firmado
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/planea-keystore.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Renombrar APK
        run: mv android/app/build/outputs/apk/release/app-release.apk entrena-en-casa.apk

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: entrena-en-casa-apk
          path: entrena-en-casa.apk

      - name: Publicar en Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: Entrena en Casa v2.0.${{ github.run_number }}
          files: entrena-en-casa.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
